name: Agent CI Failure Triage

on:
  workflow_run:
    workflows:
      - Deploy Game to GitHub Pages
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  open_or_update_issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Open or update issue for failed run
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = `<!-- ci-run-id:${run.id} -->`;
            const title = `Agent: CI failed in ${run.name}`;
            const body = [
              marker,
              `Workflow: ${run.name}`,
              `Branch: ${run.head_branch}`,
              `Conclusion: ${run.conclusion}`,
              `Run URL: ${run.html_url}`,
              "",
              "Auto-created by CI agent for follow-up."
            ].join("\n");

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "agent:todo,ci-failure",
              per_page: 100
            });

            const issue = existing.find(i => (i.body || "").includes(marker));
            if (issue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Failure reproduced in run: ${run.html_url}`
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["agent:todo", "ci-failure", "auto-generated"]
            });
