name: Agent Issue Auto Pick

on:
  issues:
    types:
      - opened
      - labeled
      - reopened

permissions:
  issues: write
  contents: read

jobs:
  take_issue:
    if: |
      contains(github.event.issue.labels.*.name, 'agent:todo') &&
      !contains(github.event.issue.labels.*.name, 'agent:in-progress') &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Mark issue in progress
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const labels = new Set((issue.labels || []).map(l => l.name));
            labels.add("agent:in-progress");
            labels.delete("agent:todo");

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              labels: [...labels]
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: [
                "Agent picked this issue for processing.",
                "",
                "Acceptance condition:",
                "- issue has reproducible context or failing run link",
                "- expected result is described",
                "- no blocker label present"
              ].join("\n")
            });
